<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meanwood Kwamwena Community Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Merriweather:ital,wght@0,300;0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <!-- Header -->
     <header class="navbar">
        <div class="nav-container">
            <div class="brand">
                <img src="logo.png" alt="Logo" class="logo" style="box-shadow: 0 6px 12px rgba(0,0,0,0.15);" />
                <h1 class="brand-text">Kwamwena Hub</h1>
            </div>
            <button class="menu-toggle" id="menuBtn">MENU</button>
            <ul class="nav-links" id="navLinks">
                <li class="nav-link"><a href="#">Home</a></li>
            </ul>
        </div>
     </header>

     <main>
        <!-- 1. Hero -->
         <section class="hero-section">
            <div class="hero-container">
                <div class="hero-text-content">
                    <span class="tagline">By residents, for residents</span>
                    <h2 class="hero-title">Welcome to Meanwood Kwamwena Community Hub</h2>
                </div>
                <div class="hero-image-wrapper">
                    <img src="hero.jpg" alt="Aerial view" />
                </div>
            </div>
        </section>
     </main>
     <footer>
            &copy; <span id="year"></span> Meanwood Kwamwena Community Hub. All Rights Reserved.
     </footer>

     <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('year').textContent = new Date().getFullYear();

            const menuBtn = document.getElementById('menuBtn');
            const navLinks = document.getElementById('navLinks');

            menuBtn.addEventListener('click', () => {
                navLinks.classList.toggle('active');
                if (navLinks.classList.contains('active')) {
                    menuBtn.textContent = 'CLOSE';
                    menuBtn.style.backgroundColor = 'var(--primary)';
                    menuBtn.style.color = '#fff';
                    menuBtn.style.borderColor = 'var(--primary)';
                } else {
                    menuBtn.textContent = 'MENU';
                    menuBtn.style.backgroundColor = 'transparent';
                    menuBtn.style.color = 'var(--primary)';
                    menuBtn.style.borderColor = 'var(--border)';
                }
            });

            document.addEventListener('click', (e) => {
                if (!menuBtn.contains(e.target) && !navLinks.contains(e.target)) {
                    navLinks.classList.remove('active');
                    menuBtn.textContent = 'MENU';
                    menuBtn.style.backgroundColor = 'transparent';
                    menuBtn.style.color = 'var(--primary)';
                    menuBtn.style.borderColor = 'var(--border)';
                }
            });
        });
     </script>
    </body>
</html>
